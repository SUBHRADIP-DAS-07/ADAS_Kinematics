# ─────────────────────────────────────────────
#  ADAS Pipeline Configuration
# ─────────────────────────────────────────────

# ── Paths ──────────────────────────────────────
data:
  ego_csv:   "data/ego.csv"
  npcs_csv:  "data/npcs.csv"
  video:     "data/video.avi"

output:
  dir:             "outputs"
  annotated_video: "outputs/annotated.avi"
  results_csv:     "outputs/results.csv"
  metrics_csv:     "outputs/metrics.csv"
  plots_dir:       "outputs/plots"

# ── CARLA / Camera ─────────────────────────────
carla:
  image_width:  1920
  image_height: 1080
  fov_degrees:  90.0            # default CARLA RGB camera FOV
  camera_z_offset: 1.7          # meters above ground (typical roof mount)
  coordinate_system: "left_hand" # UE4 / CARLA

# ── Detection (YOLOv8) ─────────────────────────
detection:
  model_weights: "yolov8m.pt"   # will auto-download on first run
  confidence_threshold: 0.4
  iou_threshold: 0.45
  vehicle_classes: [2, 3, 5, 7]  # car, motorcycle, bus, truck (COCO)
  min_bbox_height_px: 20        # filter tiny false detections

# ── Depth Estimation ───────────────────────────
depth:
  method: "bbox_geometry"       # "bbox_geometry" | "depth_anything"
  known_vehicle_height_m: 1.34  # Audi TT height (matches npcs type_id)
  depth_anything_checkpoint: "checkpoints/depth_anything_v2_vits.pth"
  depth_anything_encoder: "vits"
  scale_calibration_frames: 20  # frames used to fit depth scale factor

# ── Tracking (DeepSORT) ────────────────────────
tracking:
  max_cosine_distance: 0.4
  max_age: 30                   # frames before track is deleted
  n_init: 3                     # confirmations before track is shown
  feature_dim: 128

# ── Kalman Filter ──────────────────────────────
kalman:
  # State: [x, y, vx, vy]
  observation_noise_var: 2.0    # R — tune up if depth is noisy
  process_noise_var: 0.1        # Q — low because CARLA NPC moves smoothly
  initial_uncertainty: 10.0     # P diagonal init
  default_dt: 0.05              # fallback if sim_time delta is zero

# ── Prediction ─────────────────────────────────
prediction:
  horizon_frames: 10            # how many frames ahead to predict (~0.5 s)
  models:
    - "constant_velocity"
    - "constant_acceleration"
    # - "lstm"                  # uncomment after training

# ── LSTM (optional) ────────────────────────────
lstm:
  obs_window: 20                # input sequence length
  hidden_size: 64
  num_layers: 2
  checkpoint: "models/lstm_traj.pth"
  train_epochs: 100
  learning_rate: 0.001

# ── Validation ─────────────────────────────────
validation:
  metrics: ["ADE", "FDE", "RMSE"]
  skip_warmup_frames: 8         # first 8 frames both vehicles are stationary
